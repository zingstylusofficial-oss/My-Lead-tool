<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadStream Pro | Email Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="border-b bg-white px-6 py-4 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">LeadStream<span class="text-indigo-600">Pro</span></span>
        </div>
        <div class="flex gap-4">
            <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">v1.0 Stable</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <header class="mb-10 mt-6">
            <h1 class="text-3xl font-extrabold text-slate-900">Email Extraction Engine</h1>
            <p class="text-slate-500 mt-2 text-lg">Paste your website URLs below to extract professional contact leads.</p>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 custom-shadow">
                    <label class="block text-sm font-semibold text-slate-700 mb-2 uppercase tracking-wider">Target URLs</label>
                    <textarea id="urlInput" rows="12" 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none text-sm placeholder:text-slate-400"
                        placeholder="example.com&#10;testsite.org&#10;business.net"></textarea>
                    
                    <button onclick="startScraping()" id="btnAction" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2 group">
                        <span>Start Extraction</span>
                        <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl border border-slate-200 custom-shadow overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="font-bold text-slate-800">Live Results</h2>
                        <button onclick="exportCSV()" class="text-sm text-indigo-600 hover:text-indigo-800 font-semibold">
                            <i class="fas fa-download mr-1"></i> Export CSV
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse" id="resultsTable">
                            <thead>
                                <tr class="bg-slate-50 text-slate-400 text-[11px] uppercase tracking-widest font-bold">
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Source URL</th>
                                    <th class="px-6 py-4 text-right">Emails Found</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100" id="tableBody">
                                <tr>
                                    <td colspan="3" class="px-6 py-20 text-center text-slate-400">
                                        <i class="fas fa-database mb-3 text-4xl block opacity-20"></i>
                                        No data processed yet. Enter URLs to begin.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function startScraping() {
            const input = document.getElementById('urlInput').value;
            const urls = input.split('\n').filter(u => u.trim() !== '');
            const tableBody = document.getElementById('tableBody');
            
            if (urls.length === 0) return alert("Please enter at least one URL");

            tableBody.innerHTML = ''; // Clear table
            
            for (let url of urls) {
                // UI Mockup: In a real app, this would call your Python/Node backend API
                const row = document.createElement('tr');
                row.className = "hover:bg-indigo-50/30 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4"><span class="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-tighter">Processing...</span></td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-600">${url}</td>
                    <td class="px-6 py-4 text-right text-slate-400 italic text-xs">Waiting for server...</td>
                `;
                tableBody.appendChild(row);

                // Simulate API call delay
                await new Promise(r => setTimeout(r, 1200));
                
                // Final State Mockup
                row.innerHTML = `
                    <td class="px-6 py-4"><span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-tighter italic">Completed</span></td>
                    <td class="px-6 py-4 text-sm font-bold text-slate-800">${url}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-sm font-mono text-indigo-600 bg-indigo-50 px-2 rounded font-bold">info@${url}</span>
                            <span class="text-[10px] text-slate-400">admin@${url}</span>
                        </div>
                    </td>
                `;
            }
        }

        function exportCSV() {
            alert("Lead data exported to LeadStream_Pro_Results.csv");
        }
    </script>
</body>
</html>
